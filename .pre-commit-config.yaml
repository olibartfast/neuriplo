# See docs/CODE_QUALITY.md and PRE_COMMIT_GUIDE.md.
# One-time setup: ./scripts/quality/setup_hooks.sh

default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]
        files: ^(src|include|backends)/.*\.(cpp|hpp)$

  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: cppcheck
        files: ^(src|include|backends)/.*\.(cpp|hpp)$
        args:
          - --enable=warning
          - --std=c++17
          - --suppress=missingIncludeSystem
          - --suppress=unmatchedSuppression
          - --error-exitcode=1
          - -Iinclude
          - -Ibackends/src

  - repo: local
    hooks:
      - id: backend-docs-check
        name: Backend docs GEN sync
        entry: python3 scripts/gen_backend_docs.py --check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: clang-format-check-all
        name: clang-format check (CI parity)
        entry: scripts/quality/format.sh --check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: cppcheck-full-tree
        name: cppcheck full tree (CI parity)
        entry: scripts/quality/cppcheck.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
