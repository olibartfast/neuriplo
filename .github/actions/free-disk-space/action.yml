name: Free disk space
description: >
  Remove large preinstalled software from the hosted runner so multi-gigabyte
  backend images (ROCm/MIGRAPHX is the worst case) can build and --load
  without exhausting the root disk.

runs:
  using: composite
  steps:
    - name: Remove unused preinstalled software
      shell: bash
      run: |
        echo "Disk before cleanup:" && df -h / | tail -1
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /usr/local/.ghcup \
          /opt/hostedtoolcache/CodeQL \
          /usr/share/swift \
          /usr/local/share/powershell \
          /usr/local/share/boost \
          /usr/lib/jvm \
          /usr/share/miniconda \
          /usr/local/lib/node_modules \
          /usr/local/share/chromium \
          /opt/microsoft \
          /opt/az \
          /opt/google
        sudo docker system prune -af
        sudo docker builder prune -af
        echo "Disk after cleanup:" && df -h / | tail -1
