name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =============================================================
  # Whole-tree checks (no backend SDK needed)
  # =============================================================

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          find src include backends -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-18 --dry-run --Werror

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning --std=c++17 --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            -I include -I backends/src \
            src/ backends/

  # =============================================================
  # Per-backend lint checks (run inside the backend Docker image)
  # =============================================================

  clang-tidy:
    name: "Clang-Tidy / ${{ matrix.backend }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { backend: OPENCV_DNN,    dockerfile: docker/Dockerfile.opencvdnn }
          - { backend: ONNX_RUNTIME,  dockerfile: docker/Dockerfile.onnx-runtime }
          - { backend: LIBTORCH,      dockerfile: docker/Dockerfile.libtorch }
          - { backend: LIBTENSORFLOW, dockerfile: docker/Dockerfile.libtensorflow }
          - { backend: OPENVINO,      dockerfile: docker/Dockerfile.openvino }
          - { backend: GGML,          dockerfile: docker/Dockerfile.ggml }
          - { backend: TVM,           dockerfile: docker/Dockerfile.tvm }
          - { backend: MIGRAPHX,      dockerfile: docker/Dockerfile.migraphx }
          - { backend: TENSORRT,      dockerfile: docker/Dockerfile.tensorrt, cmake_args: -DTENSORRT_DIR=/opt/tensorrt }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: |
            docker buildx build \
              --file ${{ matrix.dockerfile }} \
              --target builder \
              --tag neuriplo-lint:${{ matrix.backend }} \
              --load \
              --cache-from type=gha,scope=docker-${{ matrix.backend }} \
              ${{ github.event_name == 'push' && format('--cache-to type=gha,mode=max,scope=docker-{0}', matrix.backend) || '' }} \
              .

      - name: Run clang-tidy
        run: |
          docker run --rm neuriplo-lint:${{ matrix.backend }} bash -c '
            apt-get update && apt-get install -y clang-tidy-18 >/dev/null 2>&1
            cmake -B/app/build -S/app \
              -DDEFAULT_BACKEND=${{ matrix.backend }} \
              ${{ matrix.cmake_args || '' }} \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON >/dev/null 2>&1
            python3 -c "
          import json, subprocess, sys
          db = json.load(open(\"/app/build/compile_commands.json\"))
          files = [e[\"file\"] for e in db]
          rc = subprocess.run([\"clang-tidy-18\", \"-p\", \"/app/build\"] + files).returncode
          sys.exit(rc)
            "
          '

  build-warnings:
    name: "Werror / ${{ matrix.backend }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { backend: OPENCV_DNN,    dockerfile: docker/Dockerfile.opencvdnn }
          - { backend: ONNX_RUNTIME,  dockerfile: docker/Dockerfile.onnx-runtime }
          - { backend: LIBTORCH,      dockerfile: docker/Dockerfile.libtorch }
          - { backend: LIBTENSORFLOW, dockerfile: docker/Dockerfile.libtensorflow }
          - { backend: OPENVINO,      dockerfile: docker/Dockerfile.openvino }
          - { backend: GGML,          dockerfile: docker/Dockerfile.ggml }
          - { backend: TVM,           dockerfile: docker/Dockerfile.tvm }
          - { backend: MIGRAPHX,      dockerfile: docker/Dockerfile.migraphx }
          - { backend: TENSORRT,      dockerfile: docker/Dockerfile.tensorrt, cmake_args: -DTENSORRT_DIR=/opt/tensorrt }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: |
            docker buildx build \
              --file ${{ matrix.dockerfile }} \
              --target builder \
              --tag neuriplo-lint:${{ matrix.backend }} \
              --load \
              --cache-from type=gha,scope=docker-${{ matrix.backend }} \
              ${{ github.event_name == 'push' && format('--cache-to type=gha,mode=max,scope=docker-{0}', matrix.backend) || '' }} \
              .

      - name: Rebuild with -Werror
        run: |
          docker run --rm neuriplo-lint:${{ matrix.backend }} bash -c '
            cmake -B/app/build -S/app \
              -DDEFAULT_BACKEND=${{ matrix.backend }} \
              ${{ matrix.cmake_args || '' }} \
              -DWERROR=ON >/dev/null 2>&1
            cmake --build /app/build --clean-first --parallel
          '

  sanitizers:
    name: "Sanitizers / ${{ matrix.backend }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { backend: OPENCV_DNN,    dockerfile: docker/Dockerfile.opencvdnn,      test_exe: OCVDNNInferTest }
          - { backend: ONNX_RUNTIME,  dockerfile: docker/Dockerfile.onnx-runtime,   test_exe: ONNXRuntimeInferTest }
          - { backend: LIBTORCH,      dockerfile: docker/Dockerfile.libtorch,        test_exe: LibtorchInferTest }
          # LIBTENSORFLOW excluded: absl headers fail to compile in Debug+sanitizer mode
          # OPENVINO excluded: TBB loads libtbbbind with RTLD_DEEPBIND, incompatible with ASan
          - { backend: GGML,          dockerfile: docker/Dockerfile.ggml,            test_exe: GGMLInferTest }
          - { backend: TVM,           dockerfile: docker/Dockerfile.tvm,             test_exe: TVMInferTest }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: |
            docker buildx build \
              --file ${{ matrix.dockerfile }} \
              --target builder \
              --tag neuriplo-lint:${{ matrix.backend }} \
              --load \
              --cache-from type=gha,scope=docker-${{ matrix.backend }} \
              ${{ github.event_name == 'push' && format('--cache-to type=gha,mode=max,scope=docker-{0}', matrix.backend) || '' }} \
              .

      - name: Rebuild with sanitizers and run tests
        run: |
          docker run --rm neuriplo-lint:${{ matrix.backend }} bash -c '
            # Ensure OpenVINO runtime libs are discoverable (harmless for other backends)
            export LD_LIBRARY_PATH=/opt/openvino/runtime/lib/intel64:${LD_LIBRARY_PATH:-}
            cmake -B/app/build -S/app \
              -DDEFAULT_BACKEND=${{ matrix.backend }} \
              ${{ matrix.cmake_args || '' }} \
              -DSANITIZERS=ON \
              -DCMAKE_BUILD_TYPE=Debug \
              -DBUILD_INFERENCE_ENGINE_TESTS=ON >/dev/null 2>&1
            cmake --build /app/build --clean-first --parallel
            ctest --test-dir /app/build --output-on-failure
          '

  # =============================================================
  # CPU Backend Tests
  # Runs on GitHub-hosted runners using Docker.
  # =============================================================
  build-and-test-cpu:
    name: "${{ matrix.backend }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: OPENCV_DNN
            dockerfile: docker/Dockerfile.opencvdnn
            image: neuriplo-opencvdnn
            test_exe: OCVDNNInferTest

          - backend: GGML
            dockerfile: docker/Dockerfile.ggml
            image: neuriplo-ggml
            test_exe: GGMLInferTest

          - backend: OPENVINO
            dockerfile: docker/Dockerfile.openvino
            image: neuriplo-openvino
            test_exe: OpenVINOInferTest

          - backend: ONNX_RUNTIME
            dockerfile: docker/Dockerfile.onnx-runtime
            image: neuriplo-onnxruntime
            test_exe: ONNXRuntimeInferTest

          - backend: LIBTENSORFLOW
            dockerfile: docker/Dockerfile.libtensorflow
            image: neuriplo-libtensorflow
            test_exe: TensorFlowInferTest

          - backend: TVM
            dockerfile: docker/Dockerfile.tvm
            image: neuriplo-tvm
            test_exe: TVMInferTest

          - backend: LIBTORCH
            dockerfile: docker/Dockerfile.libtorch
            image: neuriplo-libtorch-cpu
            test_exe: LibtorchInferTest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: |
            docker buildx build \
              --file ${{ matrix.dockerfile }} \
              --tag ${{ matrix.image }}:ci \
              --load \
              --cache-from type=gha,scope=docker-${{ matrix.backend }} \
              ${{ github.event_name == 'push' && format('--cache-to type=gha,mode=max,scope=docker-{0}', matrix.backend) || '' }} \
              .

      - name: Run tests
        run: |
          docker run --rm \
            ${{ matrix.image }}:ci \
            bash -c "
              EXE=\$(find /app -name '${{ matrix.test_exe }}' -type f -executable | head -1)
              if [ -z \"\$EXE\" ]; then
                echo 'ERROR: Test executable ${{ matrix.test_exe }} not found'
                find /app -type f -executable | head -20
                exit 1
              fi
              echo \"Running: \$EXE\"
              \"\$EXE\"
            "

  # =============================================================
  # GPU Backend Builds (build-only, no GPU required)
  # Verifies that GPU backends compile successfully using Docker.
  # Tests are skipped — they require a real GPU (see build-and-test-gpu).
  # =============================================================
  build-tensorrt:
    name: Build (TENSORRT)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: |
            docker buildx build \
              --file docker/Dockerfile.tensorrt \
              --tag neuriplo-tensorrt:ci \
              --cache-from type=gha,scope=docker-TENSORRT \
              ${{ github.event_name == 'push' && '--cache-to type=gha,mode=max,scope=docker-TENSORRT' || '' }} \
              .
