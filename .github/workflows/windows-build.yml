name: Windows Build

on:
  push:
    branches:
      - feature/windows-support
  pull_request:
    branches:
      - develop
    paths:
      - CMakeLists.txt
      - cmake/**
      - include/**
      - src/**
      - backends/**
      - .github/workflows/windows-build.yml
  workflow_dispatch:

jobs:
  build-windows-opencvdnn:
    name: Windows / OPENCV_DNN
    runs-on: windows-latest
    if: github.event_name != 'pull_request' || github.head_ref == 'feature/windows-support'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1

      - name: Clone vcpkg
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"

      - name: Install dependencies
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe" install `
            opencv4[core,dnn,highgui,videoio]:x64-windows `
            glog:x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DDEFAULT_BACKEND=OPENCV_DNN `
            -DBUILD_INFERENCE_ENGINE_TESTS=OFF

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
