name: Windows Build

on:
  push:
    branches:
      - feature/windows-support
  pull_request:
    branches:
      - develop
    paths:
      - CMakeLists.txt
      - cmake/**
      - include/**
      - src/**
      - backends/**
      - .github/workflows/windows-build.yml
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows / ${{ matrix.backend }}
    runs-on: windows-latest
    if: github.event_name != 'pull_request' || github.head_ref == 'feature/windows-support'
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: OPENCV_DNN
          - backend: ONNX_RUNTIME

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\.vcpkg-cache,readwrite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1

      - name: Load dependency versions
        shell: pwsh
        run: |
          Get-Content versions.env | ForEach-Object {
            if ($_ -notmatch '^\s*#' -and $_ -match '=') {
              $name, $value = $_.Split('=', 2)
              "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Cache vcpkg downloads and binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}\downloads
            ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: windows-vcpkg-${{ runner.os }}-x64-${{ hashFiles('versions.env', '.github/workflows/windows-build.yml', 'CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            windows-vcpkg-${{ runner.os }}-x64-

      - name: Clone vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path $env:VCPKG_ROOT)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          }

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Install common dependencies
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            opencv4[core,dnn,highgui]:x64-windows `
            glog:x64-windows

      - name: Download and Extract ONNX Runtime
        if: matrix.backend == 'ONNX_RUNTIME'
        shell: pwsh
        run: |
          $zipName = "onnxruntime-win-x64-gpu-$env:ONNX_RUNTIME_VERSION.zip"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$env:ONNX_RUNTIME_VERSION/$zipName"
          $destDir = "$HOME\dependencies"
          if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir | Out-Null }
          $archivePath = Join-Path $destDir $zipName
          if (!(Test-Path $archivePath)) {
            Invoke-WebRequest -Uri $url -OutFile $archivePath
          }
          $onnxDir = Join-Path $destDir "onnxruntime-win-x64-gpu-$env:ONNX_RUNTIME_VERSION"
          if (!(Test-Path $onnxDir)) {
            Expand-Archive -Path $archivePath -DestinationPath $destDir
          }

      - name: Configure
        shell: pwsh
        run: |
          $extraArgs = @()
          if ("${{ matrix.backend }}" -eq "ONNX_RUNTIME") {
            $extraArgs += "-DONNX_RUNTIME_DIR=$HOME\dependencies\onnxruntime-win-x64-gpu-$env:ONNX_RUNTIME_VERSION"
          }

          cmake -S . -B build\${{ matrix.backend }} `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DDEFAULT_BACKEND=${{ matrix.backend }} `
            -DBUILD_INFERENCE_ENGINE_TESTS=OFF `
            @extraArgs

      - name: Build
        shell: pwsh
        run: |
          cmake --build build\${{ matrix.backend }} --config Release --parallel
