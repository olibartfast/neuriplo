name: C++ Lint

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          find src include backends -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-18 --dry-run --Werror

  clang-tidy:
    name: Clang-Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Generate compile_commands.json
        run: |
          cmake -S . -B build \
            -DDEFAULT_BACKEND=OPENCV_DNN \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Run clang-tidy
        run: |
          find src backends -name '*.cpp' | \
            xargs clang-tidy-18 -p build

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning --std=c++17 --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            -I include -I backends/src \
            src/ backends/

  build-warnings:
    name: Build with Strict Warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev libgoogle-glog-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Configure with -DWERROR=ON
        run: |
          cmake -S . -B build \
            -DDEFAULT_BACKEND=OPENCV_DNN \
            -DWERROR=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

  sanitizers:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev libgoogle-glog-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Configure with sanitizers
        run: |
          cmake -S . -B build \
            -DDEFAULT_BACKEND=OPENCV_DNN \
            -DSANITIZERS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests under sanitizers
        run: ctest --test-dir build --output-on-failure
